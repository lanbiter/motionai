name: 🐛 Bug | Bug Report
description: 报告错误或异常问题 | Report an error or unexpected behavior
title: "[Bug]: "
labels:
  - bug

body:
  - type: markdown
    attributes:
      value: |
        **提交问题前，请先阅读仓库根目录 [README.md](https://github.com/lanbiter/motionai/blob/main/README.md)（环境要求、快速开始等）。**
        
        **Before submitting an issue, please read the repository [README.md](https://github.com/lanbiter/motionai/blob/main/README.md) (requirements, quick start, etc.).**
        
  - type: textarea
    attributes:
      label: 问题描述 | Current Behavior
      description: |
        描述您遇到的问题
        Describe the issue you're experiencing
      placeholder: |
        当我执行...操作时，程序出现了...问题
        When I perform..., the program shows...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 重现步骤 | Steps to Reproduce
      description: |
        详细描述如何重现此问题
        Describe in detail how to reproduce this issue
      placeholder: |
        1. 打开...
        2. 点击...
        3. 出现错误...
        
        1. Open...
        2. Click on...
        3. Error occurs...
    validations:
      required: true
  - type: textarea
    attributes:
      label: 错误日志 | Error Logs
      description: |
        请提供相关错误信息或日志（注意不要包含敏感信息）
        Please provide any error messages or logs (be careful not to include sensitive information)
      placeholder: |
        错误信息、日志或截图...
        Error messages, logs, or screenshots...
    validations:
      required: true
  - type: input
    attributes:
      label: Python 版本 | Python Version
      description: |
        您使用的 Python 版本
        The Python version you're using
      placeholder: v3.13.0, v3.10.0, etc.
    validations:
      required: true
  - type: input
    attributes:
      label: 操作系统 | Operating System
      description: |
        您的操作系统信息
        Your operating system information
      placeholder: macOS 14.1, Windows 11, Ubuntu 22.04, etc.
    validations:
      required: true
  - type: input
    attributes:
      label: motionai 版本 | Version
      description: |
        您使用的 motionai 版本（如 git 提交或 tag）
        The motionai version you're using (e.g. git commit or tag)
      placeholder: v1.2.2, etc.
    validations:
      required: true
  - type: textarea
    attributes:
      label: 补充信息 | Additional Information
      description: |
        其他对解决问题有帮助的信息（如截图、视频等）
        Any other information that might help solve the issue (screenshots, videos, etc.)
    validations:
      required: false